<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla starter</title>
  </head>
  <body>
    <div id="app">
      <main
        px-4 py-10
        text="center gray-700 dark:gray-200"
      >
        <div>
          <p>
            🚀 Vanilla starter
          </p>
        </div>
        <nav mt-6 flex justify-center gap-2 text-xl>
          <button id="toggle-dark" icon-btn title="切换深色模式">
            <div i-carbon-sun dark:i-carbon-moon></div>
          </button>

          <a icon-btn href="https://github.com/tlyboy/vanilla-starter" target="_blank" rel="noopener noreferrer" title="GitHub">
            <div i-carbon-logo-github></div>
          </a>
        </nav>
      </main>
    </div>
    <script>
      ;(function () {
        const prefersDark =
          window.matchMedia &&
          window.matchMedia('(prefers-color-scheme: dark)').matches
        const setting = localStorage.getItem('color-schema') || 'auto'
        if (setting === 'dark' || (prefersDark && setting !== 'light'))
          document.documentElement.classList.toggle('dark', true)
      })()
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
